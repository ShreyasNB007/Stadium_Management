                            <thead>
                                <tr>
                                    <th>Event Name</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Organizer</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for event in stadium.events %}
                                <tr id="event-{{ event.id }}">
                                    <td>{{ event.name }}</td>
                                    <td>{{ event.date.strftime('%Y-%m-%d') }}</td>
                                    <td>
                                        <span class="badge bg-{{ event.status|status_color }}">
                                            {{ event.status|title }}
                                        </span>
                                    </td>
                                    <td>{{ event.organizer.name }}</td>
                                    <td>
                                        {% if event.status == 'pending' %}
                                        <div class="btn-group btn-group-sm">
                                            <form action="{{ url_for('admin.approve_event', id=event.id) }}" method="POST" class="d-inline">
                                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                                <button type="submit" class="btn btn-success btn-sm" 
                                                        onclick="return confirm('Are you sure you want to approve this event?')">
                                                    Approve
                                                </button>
                                            </form>
                                            <form action="{{ url_for('admin.reject_event', id=event.id) }}" method="POST" class="d-inline ms-1">
                                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                                <button type="submit" class="btn btn-danger btn-sm" 
                                                        onclick="return confirm('Are you sure you want to reject this event?')">
                                                    Reject
                                                </button>
                                            </form>
                                        </div>
                                        {% endif %}
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
