{% extends "base.html" %}

{% block title %}Edit Event{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Edit Event</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('organizer.edit_event', event_id=event.id) }}" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-3">
                    <label for="name" class="form-label">Event Title</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ event.name }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" required>{{ event.description }}</textarea>
                </div>
                
                <div class="mb-3">
                    <label for="category_id" class="form-label">Category</label>
                    <select class="form-select" id="category_id" name="category_id" required>
                        <option value="">Select a category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if category.id == event.category_id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="total_tickets" class="form-label">Total Tickets</label>
                    <input type="number" class="form-control" id="total_tickets" name="total_tickets" min="1" value="{{ event.total_tickets }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="price" class="form-label">Ticket Price</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="price" name="price" min="0" step="0.01" value="{{ event.price }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="thumbnail" class="form-label">Event Thumbnail</label>
                    <input type="file" class="form-control" id="thumbnail" name="thumbnail" accept="image/*">
                    {% if event.thumbnail %}
                    <div class="mt-2">
                        <p class="mb-1">Current thumbnail:</p>
                        <img src="{{ url_for('static', filename='event_thumbnails/' + event.thumbnail) }}" 
                             alt="Event thumbnail" 
                             class="img-thumbnail" 
                             style="max-height: 200px;">
                    </div>
                    {% endif %}
                    <div class="form-text">Upload a new image to replace the current thumbnail (JPG, PNG, or GIF).</div>
                </div>
                
                <div class="d-flex gap-2">
                    <a href="{{ url_for('organizer.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Event</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
