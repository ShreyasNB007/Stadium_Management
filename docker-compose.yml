version: '3.9'

services:

  web:
    build: .
    container_name: stadium-app

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: stadium_db

  mysql:
    image: mysql:8.0
    container_name: stadium-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stadium_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: